<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台登录 - 美食菜谱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 50%, #FFB3B3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            background: #FFFFFF;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
        }
        
        .login-header {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            padding: 50px 40px 40px;
            text-align: center;
            position: relative;
        }
        
        .login-header::before {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            right: 0;
            height: 40px;
            background: #FFFFFF;
            border-radius: 40px 40px 0 0;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 40px;
        }
        
        .login-header h1 {
            color: #FFFFFF;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        
        .login-header p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }
        
        .login-body {
            padding: 30px 40px 40px;
        }
        
        .form-group {
            margin-bottom: 24px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            color: #333333;
            margin-bottom: 10px;
            font-weight: 500;
        }
        
        .form-input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 2px solid #F0F0F0;
            border-radius: 12px;
            font-size: 15px;
            color: #333333;
            transition: all 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #FF6B6B;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }
        
        .form-input::placeholder {
            color: #CCCCCC;
        }
        
        .login-btn {
            width: 100%;
            height: 52px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%);
            border: none;
            border-radius: 26px;
            font-size: 16px;
            font-weight: bold;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.3);
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(255, 107, 107, 0.4);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        .tips {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #F0F0F0;
        }
        
        .tips p {
            font-size: 13px;
            color: #999999;
            margin-bottom: 6px;
        }
        
        .tips .account {
            font-size: 13px;
            color: #FF6B6B;
            font-weight: 500;
        }
        
        .error-msg {
            background: #FFF2F2;
            border: 1px solid #FFCCCC;
            color: #FF6B6B;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        
        .error-msg.show {
            display: block;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        
        .shake {
            animation: shake 0.4s ease;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-icon">🍽️</div>
            <h1>美食菜谱</h1>
            <p>管理后台登录</p>
        </div>
        
        <div class="login-body">
            <div id="errorMsg" class="error-msg"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" id="username" class="form-input" placeholder="请输入用户名" autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">登 录</button>
            </form>
            
            <div class="tips">
                <p>默认管理员账号</p>
                <p class="account">用户名：admin / 密码：admin123</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!username) {
                showError('请输入用户名');
                return;
            }
            
            if (!password) {
                showError('请输入密码');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            
            try {
                const response = await axios.post('/admin/login/login', {
                    username: username,
                    password: password
                });
                
                if (response.data.code === 200) {
                    window.location.href = response.data.data.redirect || '/admin/index';
                } else {
                    showError(response.data.msg || '登录失败');
                }
            } catch (error) {
                if (error.response && error.response.data) {
                    showError(error.response.data.msg || '登录失败');
                } else {
                    showError('网络错误，请稍后重试');
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = '登 录';
            }
        });
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.classList.add('show');
            
            document.querySelector('.login-container').classList.add('shake');
            setTimeout(() => {
                document.querySelector('.login-container').classList.remove('shake');
            }, 400);
            
            setTimeout(() => {
                errorMsg.classList.remove('show');
            }, 3000);
        }
        
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginBtn').click();
            }
        });
    </script>
</body>
</html>
